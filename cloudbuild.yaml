steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/credit-card-fraud:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/credit-card-fraud:latest'
      - '.'

  # Push the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/credit-card-fraud:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/credit-card-fraud:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'credit-card-fraud'
      - '--image'
      - 'gcr.io/$PROJECT_ID/credit-card-fraud:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--concurrency'
      - '1000'
      - '--max-instances'
      - '10'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/credit-card-fraud:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/credit-card-fraud:latest'
