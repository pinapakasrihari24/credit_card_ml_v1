<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Not Found</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; padding: 40px; }
        .icon { font-size: 4rem; margin-bottom: 20px; }
        h1 { font-size: 2rem; color: #f1f5f9; margin-bottom: 10px; }
        p { color: #94a3b8; margin-bottom: 30px; }
        .user-id { background: #334155; padding: 8px 16px; border-radius: 6px; color: #38bdf8; font-family: monospace; }
        a { color: #38bdf8; text-decoration: none; padding: 12px 24px; background: #1e293b; border-radius: 8px; border: 1px solid #334155; display: inline-block; transition: all 0.3s; }
        a:hover { background: #334155; border-color: #38bdf8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔍</div>
        <h1>User Not Found</h1>
        <p>No user found with ID: <span class="user-id">{{ user_id }}</span></p>
        <a href="/">← Back to Dashboard</a>
        <span style="color: #64748b; margin: 0 10px;">|</span>
        <a href="/logout">Logout</a>
    </div>
</body>
</html>
