<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Credit Card Fraud Detection</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { width: 100%; max-width: 400px; padding: 20px; }
        .login-box { background: #1e293b; border-radius: 12px; padding: 40px; border: 1px solid #334155; }
        h1 { font-size: 1.8rem; color: #f1f5f9; margin-bottom: 8px; text-align: center; }
        .subtitle { color: #94a3b8; font-size: 0.95rem; margin-bottom: 30px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #94a3b8; margin-bottom: 8px; font-size: 0.9rem; }
        input[type="text"], input[type="password"] { width: 100%; padding: 14px 20px; font-size: 1rem; border: 2px solid #334155; border-radius: 8px; background: #0f172a; color: #e2e8f0; outline: none; transition: border-color 0.3s; }
        input[type="text"]:focus, input[type="password"]:focus { border-color: #38bdf8; }
        button { width: 100%; padding: 14px; font-size: 1rem; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; transition: background 0.3s; font-weight: 600; }
        button:hover { background: #2563eb; }
        .error { background: #7f1d1d; color: #fca5a5; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; }
        .info { background: #1e293b; border: 1px solid #334155; color: #94a3b8; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 0.85rem; text-align: center; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>Admin Login</h1>
            <p class="subtitle">Credit Card Fraud Detection Dashboard</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="error">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                </div>
                <button type="submit">Login</button>
            </form>
        </div>
    </div>
</body>
</html>
